<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ナンプレ絶対解くマン</title>
  <meta name="theme-color" content="#1e3a5f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="解くマン" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>ナンプレ絶対解くマン</h1>
      <p class="version">ver1.9.1</p>
      <p class="subtitle">写真を撮影 or 選択して数独を自動解読</p>
    </header>

    <!-- ステップインジケーター -->
    <div id="step-indicator">
      <div class="step active" data-step="1"><span>1</span> 画像入力</div>
      <div class="step" data-step="2"><span>2</span> 補正確認</div>
      <div class="step" data-step="3"><span>3</span> 認識確認</div>
      <div class="step" data-step="4"><span>4</span> 解答</div>
    </div>

    <!-- ステップ1: 画像入力 -->
    <section id="step-1" class="step-section active">
      <div class="card">
        <h2>画像を入力してください</h2>
        <div class="input-buttons">
          <button id="btn-camera" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            カメラで撮影
          </button>
          <button id="btn-gallery" class="btn btn-secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            ギャラリーから選択
          </button>
        </div>
        <!-- 隠し input -->
        <input type="file" id="input-gallery" accept="image/*" style="display:none" />

        <!-- カメラプレビュー -->
        <div id="camera-preview-container" class="hidden">
          <video id="camera-video" autoplay playsinline muted></video>
          <div class="camera-controls">
            <button id="btn-capture" class="btn btn-success">撮影</button>
            <button id="btn-camera-close" class="btn btn-secondary">閉じる</button>
          </div>
        </div>

        <!-- 画像プレビュー -->
        <div id="preview-container" class="hidden">
          <canvas id="canvas-preview"></canvas>
          <button id="btn-next-1" class="btn btn-success">次へ → 補正処理</button>
        </div>
      </div>
    </section>

    <!-- ステップ2: 歪み補正確認 -->
    <section id="step-2" class="step-section hidden">
      <div class="card">
        <h2>補正結果を確認</h2>
        <p class="hint">数独グリッドが正しく検出されているか確認してください。</p>
        <div class="canvas-row">
          <div class="canvas-wrap">
            <label>元画像 (検出枠)</label>
            <canvas id="canvas-detected"></canvas>
          </div>
          <div class="canvas-wrap">
            <label>補正後</label>
            <canvas id="canvas-warped"></canvas>
          </div>
        </div>
        <div id="detection-error" class="error-msg hidden">
          グリッドを自動検出できませんでした。手動で4隅を選択してください。
          <div id="manual-hint">画像上の数独の4隅を左上→右上→右下→左下の順にタップしてください</div>
        </div>
        <div class="btn-row">
          <button id="btn-back-2" class="btn btn-ghost">← 戻る</button>
          <button id="btn-next-2" class="btn btn-success">次へ → 数字認識</button>
        </div>
      </div>
    </section>

    <!-- ステップ3: 数字認識確認 -->
    <section id="step-3" class="step-section hidden">
      <div class="card">
        <h2>認識結果を確認・修正</h2>
        <p class="hint">誤認識があればセルをタップして修正できます。0は空白を意味します。</p>
        <div id="sudoku-input-grid" class="sudoku-grid"></div>
        <div class="btn-row">
          <button id="btn-back-3" class="btn btn-ghost">← 戻る</button>
          <button id="btn-solve" class="btn btn-success">解く →</button>
        </div>
      </div>
    </section>

    <!-- ステップ4: 解答表示 -->
    <section id="step-4" class="step-section hidden">
      <div class="card">
        <h2>解答</h2>
        <div id="solve-result"></div>
        <div id="sudoku-solution-grid" class="sudoku-grid"></div>
        <div class="btn-row">
          <button id="btn-back-4" class="btn btn-ghost">← 戻る</button>
          <button id="btn-explain" class="btn btn-secondary">解説を見る</button>
          <button id="btn-restart" class="btn btn-primary">最初からやり直す</button>
        </div>
      </div>
    </section>

    <!-- ステップ5: 解法解説 -->
    <section id="step-5" class="step-section hidden">
      <div class="card">
        <h2>解法解説</h2>
        <div id="explain-progress">
          <span id="explain-step-label">ステップ 0 / 0</span>
        </div>
        <div id="sudoku-explain-grid" class="sudoku-grid"></div>
        <div id="explain-reason" class="explain-reason"></div>
        <div class="btn-row explain-nav">
          <button id="btn-explain-prev" class="btn btn-ghost">← 前</button>
          <button id="btn-explain-auto" class="btn btn-secondary">▶ 自動再生</button>
          <button id="btn-explain-next" class="btn btn-ghost">次 →</button>
        </div>
        <div class="btn-row">
          <button id="btn-explain-back" class="btn btn-ghost">← 解答に戻る</button>
        </div>
      </div>
    </section>

    <!-- ローディングオーバーレイ -->
    <div id="loading-overlay" class="hidden">
      <div class="spinner"></div>
      <p id="loading-msg">処理中...</p>
    </div>
  </div>

  <!-- OpenCV.js (CDN with fallback) -->
  <!-- @techstark/opencv-js は UMD ラッパーでグローバル Module を参照しないため、
       script.onload で window.cv の型を判定し適切に初期化する。 -->
  <script>
    // ── OpenCV.js 初期化完了を通知する共通関数 ──
    function _notifyOpenCvReady() {
      if (window._opencvNotified) return;
      window._opencvNotified = true;
      console.log('OpenCV.js 初期化完了');
      if (window._cvReadyPoll) { clearInterval(window._cvReadyPoll); window._cvReadyPoll = null; }
      if (typeof onOpenCvReady === 'function') {
        onOpenCvReady();
      } else {
        window._opencvRuntimeReady = true;
      }
    }

    // グローバル Module (docs.opencv.org 版の標準パターン用フォールバック)
    var Module = {
      onRuntimeInitialized: function () {
        _notifyOpenCvReady();
      }
    };

    // ── OpenCV.js ロード後の初期化ハンドラ ──
    function _initOpenCv() {
      var _cv = window.cv;
      if (!_cv) {
        console.warn('window.cv が undefined — Module パターンで待機します');
        return;
      }

      if (typeof _cv === 'function') {
        // @techstark UMD パターン: cv はファクトリー関数
        console.log('OpenCV.js factory パターンを検出');
        try {
          var result = _cv({
            onRuntimeInitialized: function () { _notifyOpenCvReady(); }
          });
          if (result instanceof Promise) {
            result.then(function (cvObj) { window.cv = cvObj; _notifyOpenCvReady(); });
          } else if (result) {
            window.cv = result;
          }
        } catch (e) {
          console.error('OpenCV.js factory 呼び出しエラー:', e);
        }
      } else if (_cv instanceof Promise) {
        // Promise パターン
        console.log('OpenCV.js Promise パターンを検出');
        _cv.then(function (cvObj) {
          window.cv = cvObj;
          _notifyOpenCvReady();
        });
      } else if (typeof _cv === 'object') {
        // 既にオブジェクト — cv.Mat が存在すれば初期化済み
        if (_cv.Mat) {
          console.log('OpenCV.js 既に初期化済み');
          _notifyOpenCvReady();
        } else {
          // まだ初期化中 → onRuntimeInitialized を上書き設定
          console.log('OpenCV.js オブジェクト検出、WASM 初期化待ち');
          _cv.onRuntimeInitialized = function () { _notifyOpenCvReady(); };
        }
      }

      // Safety net: onRuntimeInitialized が発火しない場合に備え cv.Mat をポーリング
      if (!window._opencvNotified) {
        var pollStart = Date.now();
        window._cvReadyPoll = setInterval(function () {
          if (window._opencvNotified) { clearInterval(window._cvReadyPoll); return; }
          var c = window.cv;
          if (c && typeof c === 'object' && c.Mat) {
            console.log('OpenCV.js ポーリングで初期化完了を検出');
            _notifyOpenCvReady();
          } else if (Date.now() - pollStart > 60000) {
            clearInterval(window._cvReadyPoll);
            console.warn('OpenCV.js WASM 初期化タイムアウト (60s)');
          }
        }, 1500);
      }
    }

    // ── CDN フォールバックチェーン ──
    var _opencvCdnUrls = [
      'https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.12.0-release.1/dist/opencv.js',
      'https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.10.0-release.1/dist/opencv.js',
      'https://cdn.jsdelivr.net/npm/@techstark/opencv-js/dist/opencv.js'
    ];
    var _opencvUrlIndex = 0;
    var _opencvLoadTimer = null;
    var _opencvCurrentScript = null;

    function _loadOpenCvScript() {
      if (_opencvUrlIndex >= _opencvCdnUrls.length) {
        if (typeof onOpenCvError === 'function') onOpenCvError();
        return;
      }
      var url = _opencvCdnUrls[_opencvUrlIndex];
      console.log('OpenCV.js を読み込み中: ' + url);

      // 前回失敗したスクリプト要素を除去
      if (_opencvCurrentScript && _opencvCurrentScript.parentNode) {
        _opencvCurrentScript.parentNode.removeChild(_opencvCurrentScript);
      }

      var script = document.createElement('script');
      _opencvCurrentScript = script;
      script.async = true;
      script.src = url;

      // ダウンロード タイムアウト (45秒)
      _opencvLoadTimer = setTimeout(function () {
        console.warn('OpenCV.js ダウンロードタイムアウト (' + url + ')');
        script.onerror = null;
        script.onload = null;
        if (script.parentNode) script.parentNode.removeChild(script);
        _opencvUrlIndex++;
        _loadOpenCvScript();
      }, 45000);

      script.onerror = function () {
        clearTimeout(_opencvLoadTimer);
        console.warn('OpenCV.js の読み込みに失敗 (' + url + ')。次の CDN を試します…');
        _opencvUrlIndex++;
        _loadOpenCvScript();
      };
      script.onload = function () {
        clearTimeout(_opencvLoadTimer);
        console.log('OpenCV.js スクリプトダウンロード完了: ' + url);
        _initOpenCv();
      };
      document.head.appendChild(script);
    }
    _loadOpenCvScript();
  </script>
  <!-- Tesseract.js OCR (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <script src="js/sudokuSolver.js"></script>
  <script src="js/digitRecognizer.js"></script>
  <script src="js/imageProcessor.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
      // SW 更新時に自動リロード（古い HTML で動いている場合への対策）
      navigator.serviceWorker.addEventListener('message', function (event) {
        if (event.data && event.data.type === 'SW_UPDATED') {
          console.log('Service Worker が更新されました。ページをリロードします。');
          location.reload();
        }
      });
    }
  </script>
</body>
</html>
