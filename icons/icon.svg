<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00cc66"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Robot body / machine casing -->
  <rect x="106" y="140" width="300" height="280" rx="30" fill="url(#body)" stroke="#1e40af" stroke-width="6"/>

  <!-- Machine top: antenna -->
  <rect x="244" y="80" width="24" height="60" rx="12" fill="#60a5fa"/>
  <circle cx="256" cy="75" r="16" fill="#f59e0b" stroke="#d97706" stroke-width="3"/>

  <!-- Machine ears / bolts -->
  <circle cx="106" cy="200" r="22" fill="#60a5fa" stroke="#1e40af" stroke-width="4"/>
  <circle cx="406" cy="200" r="22" fill="#60a5fa" stroke="#1e40af" stroke-width="4"/>
  <circle cx="106" cy="200" r="8" fill="#1e40af"/>
  <circle cx="406" cy="200" r="8" fill="#1e40af"/>

  <!-- Visor / eye screen -->
  <rect x="146" y="165" width="220" height="55" rx="14" fill="#0f172a"/>
  <rect x="152" y="170" width="90" height="44" rx="8" fill="url(#screen)" opacity="0.9"/>
  <rect x="270" y="170" width="90" height="44" rx="8" fill="url(#screen)" opacity="0.9"/>
  <!-- Eye scanline effect -->
  <line x1="152" y1="185" x2="242" y2="185" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
  <line x1="152" y1="195" x2="242" y2="195" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
  <line x1="270" y1="185" x2="360" y2="185" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
  <line x1="270" y1="195" x2="360" y2="195" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
  <!-- Pupils -->
  <circle cx="197" cy="192" r="10" fill="#0f172a"/>
  <circle cx="315" cy="192" r="10" fill="#0f172a"/>

  <!-- Sudoku grid on chest (3x3 representation) -->
  <rect x="166" y="245" width="180" height="150" rx="8" fill="#f8fafc" stroke="#1e40af" stroke-width="3"/>

  <!-- Grid lines (3x3) -->
  <line x1="226" y1="245" x2="226" y2="395" stroke="#334155" stroke-width="2"/>
  <line x1="286" y1="245" x2="286" y2="395" stroke="#334155" stroke-width="2"/>
  <line x1="166" y1="295" x2="346" y2="295" stroke="#334155" stroke-width="2"/>
  <line x1="166" y1="345" x2="346" y2="345" stroke="#334155" stroke-width="2"/>

  <!-- Numbers in grid -->
  <text x="196" y="280" font-family="monospace" font-size="34" font-weight="bold" fill="#1e3a5f" text-anchor="middle">7</text>
  <text x="316" y="280" font-family="monospace" font-size="34" font-weight="bold" fill="#1e3a5f" text-anchor="middle">3</text>
  <text x="256" y="330" font-family="monospace" font-size="34" font-weight="bold" fill="#2563eb" text-anchor="middle">5</text>
  <text x="196" y="380" font-family="monospace" font-size="34" font-weight="bold" fill="#1e3a5f" text-anchor="middle">1</text>
  <text x="256" y="280" font-family="monospace" font-size="34" font-weight="bold" fill="#ef4444" text-anchor="middle">9</text>
  <text x="316" y="380" font-family="monospace" font-size="34" font-weight="bold" fill="#2563eb" text-anchor="middle">4</text>

  <!-- Machine arms (small) -->
  <rect x="80" y="300" width="26" height="80" rx="13" fill="#3b82f6" stroke="#1e40af" stroke-width="3"/>
  <rect x="406" y="300" width="26" height="80" rx="13" fill="#3b82f6" stroke="#1e40af" stroke-width="3"/>
  <!-- Claw hands -->
  <rect x="78" y="375" width="14" height="30" rx="5" fill="#60a5fa"/>
  <rect x="96" y="375" width="14" height="30" rx="5" fill="#60a5fa"/>
  <rect x="404" y="375" width="14" height="30" rx="5" fill="#60a5fa"/>
  <rect x="422" y="375" width="14" height="30" rx="5" fill="#60a5fa"/>

  <!-- Status LEDs on body -->
  <circle cx="150" cy="430" r="7" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="175" cy="430" r="7" fill="#f59e0b"/>
  <circle cx="200" cy="430" r="7" fill="#22c55e"/>

  <!-- Bottom machine feet -->
  <rect x="160" y="420" width="70" height="20" rx="10" fill="#1e40af"/>
  <rect x="282" y="420" width="70" height="20" rx="10" fill="#1e40af"/>
</svg>
